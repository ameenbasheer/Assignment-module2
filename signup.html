<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow form-card">
            <h3 class="text-center mb-3">Create Account</h3>

            <form id="signupForm">

                <input type="text" id="fullName" class="form-control mb-2" placeholder="Full Name">
                <small class="error" id="nameError"></small>

                <input type="email" id="email" class="form-control mb-2" placeholder="Email">
                <small class="error" id="emailError"></small>

                <input type="text" id="phone" class="form-control mb-2" placeholder="Phone Number">
                <small class="error" id="phoneError"></small>

                <input type="text" id="location" class="form-control mb-2" placeholder="Location/City">
                <small class="error" id="locationError"></small>

                <div class="input-group mb-2">
                    <input type="password" id="password" class="form-control" placeholder="Password">
                    <button type="button" class="btn btn-outline-secondary"
                        onclick="togglePassword('password')">👁</button>
                </div>
                <small class="error" id="passwordError"></small>

                <div class="input-group mb-2">
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password">
                    <button type="button" class="btn btn-outline-secondary"
                        onclick="togglePassword('confirmPassword')">👁</button>
                </div>
                <small class="error" id="confirmError"></small>

                <button type="submit" class="btn btn-primary w-100 mt-2">Sign Up</button>

                <p class="text-center mt-3">
                    Already have an account?
                    <a href="signin.html">Sign In</a>
                </p>

            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
