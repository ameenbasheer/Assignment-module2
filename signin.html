<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow form-card">
            <h3 class="text-center mb-3">Sign In</h3>

            <form id="signinForm">

                <input type="email" id="loginEmail" class="form-control mb-2" placeholder="Email">
                <small class="error" id="loginEmailError"></small>

                <div class="input-group mb-2">
                    <input type="password" id="loginPassword" class="form-control" placeholder="Password">
                    <button type="button" class="btn btn-outline-secondary"
                        onclick="togglePassword('loginPassword')">👁</button>
                </div>
                <small class="error" id="loginPasswordError"></small>

                <button type="submit" class="btn btn-success w-100 mt-2">Sign In</button>

                <p class="text-center mt-3">
                    Don't have an account?
                    <a href="signup.html">Sign Up</a>
                </p>

            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
